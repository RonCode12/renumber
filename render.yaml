databases:
  - name: campaign-work-plans-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: campaign-work-plans
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: campaign-work-plans-db
          property: connectionString
