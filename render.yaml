databases:
  - name: campaign-work-plans-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: campaign-work-plans
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.12.0
      - key: BASIC_AUTH_USER
        value: renumber
      - key: BASIC_AUTH_PASSWORD
        value: medias
      - key: AUTH_SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: campaign-work-plans-db
          property: connectionString
